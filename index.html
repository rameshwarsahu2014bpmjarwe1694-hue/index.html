
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDS Departmental Exam Notes</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #b8351a; color: white; padding: 1rem; text-align: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .cat-card { background: white; padding: 20px; border-radius: 10px; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; text-align: center; }
        .active { display: block !important; }
        .view { display: none; }
        #view-home { display: block; }
    </style>
</head>
<body>
    <header>
        <h1>GDS Exam Study Hub</h1>
        <button id="langToggle">Hindi/English</button>
    </header>

    <div class="container">
        <!-- Home View -->
        <div id="view-home" class="view active">
            <h2>Select Category</h2>
            <div id="catGrid" class="cat-grid"></div>
        </div>

        <!-- Quiz View -->
        <div id="view-quiz" class="view">
            <h2 id="quizCat">Quiz</h2>
            <div id="qContainer"></div>
            <div style="margin-top:20px;">
                <button id="prevBtn">Previous</button>
                <button id="nextBtn">Next</button>
                <button id="quitBtn">Quit</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
